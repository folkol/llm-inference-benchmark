# llmb default benchmark configuration
# Copy this to bench.toml and edit as needed.
# Run `llmb init` to place a copy in the current directory.

# Devices to benchmark.
#   "cpu"   — all layers on CPU (--n-gpu-layers 0)
#   "gpu"   — all layers on GPU (--n-gpu-layers -1); falls back gracefully if no GPU
#   "mixed" — explicit partial offload (--n-gpu-layers = mixed_gpu_layers below)
#   "auto"  — let llama.cpp decide based on available VRAM
#
# On a CPU-only machine just keep ["cpu"].
# On a GPU machine use ["cpu", "gpu"] for the standard comparison.
# Add "mixed" manually if you want to test partial GPU offload.
devices = ["cpu", "gpu"]

# Warm repetitions per (model × workload × device) scenario
warm_runs = 1

# Concurrent batch benchmarks are intentionally disabled.
# Each scenario measures:
#   1. first request after model load
#   2. warm_runs sequential requests on the already-loaded model
batch_sizes = []

# Tokens to generate per completion (can be overridden per workload)
max_tokens = 256

# CPU threads (0 = auto-detect)
cpu_threads = 0

# GPU layers to offload when device = "gpu" (-1 = all layers)
gpu_layers = -1

# GPU layers to offload when device = "mixed".
# This intentionally puts only some layers on GPU so the rest stay on CPU.
# Tune this to sit just below your VRAM capacity for the most interesting results.
#
# Rough guidance (Q4_K_M, approximate total layers per architecture):
#   0.5–1.5B  ~22–28 layers     7–8B  ~32 layers
#   3B        ~28–36 layers    14B    ~40 layers
#                              32B    ~64 layers
#
# Example: mixed_gpu_layers = 16 puts the first 16 layers on GPU, rest on CPU.
mixed_gpu_layers = 16

# ─── Models ──────────────────────────────────────────────────────────────────
# Models are ordered small → large so the VRAM cliff is visible in plots.
# Mix of Qwen3 (latest Alibaba series, Apr 2025) and Llama 3.2/3.1 (Meta)
# to compare two architectures side-by-side at similar parameter counts.
#
# Confirmed Q4_K_M sizes (bartowski GGUFs):
#
#   Model          Size      16 GB GPU   32 GB CPU   Mac mini 16 GB
#   ─────────────  ────────  ─────────   ─────────   ──────────────
#   Qwen3-0.6B     0.48 GB   fits        fits        fits
#   Llama-3.2-1B   0.74 GB   fits        fits        fits
#   Qwen3-1.7B     1.28 GB   fits        fits        fits
#   Llama-3.2-3B   2.02 GB   fits        fits        fits
#   Qwen3-4B       2.50 GB   fits        fits        fits
#   Qwen3-8B       5.03 GB   fits        fits        fits
#   Llama-3.1-8B   4.92 GB   fits        fits        fits
#   Qwen3-14B      9.00 GB   fits        fits        fits (tight)
#   Qwen3-32B     ~20 GB     OVERFLOWS   fits        OVERFLOWS
#
# When a model overflows VRAM, llama.cpp shuffles layers between GPU and CPU,
# causing a sharp throughput drop — the "cliff" you want to see in the plots.
#
# Comment out any models you don't want to download or benchmark.
# Run `llmb models fetch` to download all active models.

# ── Qwen3 (Alibaba, Apr 2025) ──────────────────────────────────────────────
[[models]]
name         = "Qwen3-0.6B-Q4_K_M"
filename     = "Qwen_Qwen3-0.6B-Q4_K_M.gguf"
url          = "https://huggingface.co/bartowski/Qwen_Qwen3-0.6B-GGUF/resolve/main/Qwen_Qwen3-0.6B-Q4_K_M.gguf"
params       = "0.6B"
quantization = "Q4_K_M"
context_length = 1024

[[models]]
name         = "Qwen3-4B-Q4_K_M"
filename     = "Qwen_Qwen3-4B-Q4_K_M.gguf"
url          = "https://huggingface.co/bartowski/Qwen_Qwen3-4B-GGUF/resolve/main/Qwen_Qwen3-4B-Q4_K_M.gguf"
params       = "4B"
quantization = "Q4_K_M"
context_length = 1024

