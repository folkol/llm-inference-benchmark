# ── Larger Qwen size ────────────────────────────────────────────────────────
[[models]]
name         = "Qwen3-8B-Q4_K_M"
filename     = "Qwen_Qwen3-8B-Q4_K_M.gguf"
url          = "https://huggingface.co/bartowski/Qwen_Qwen3-8B-GGUF/resolve/main/Qwen_Qwen3-8B-Q4_K_M.gguf"
params       = "8B"
