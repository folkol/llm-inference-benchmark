# llmb default benchmark configuration
# Copy this to bench.toml and edit as needed.
# Run `llmb init` to place a copy in the current directory.

# Devices to benchmark. Supported: "cpu", "gpu", "auto"
# Comment out "gpu" if no GPU is available.
devices = ["cpu"]

# Warm repetitions per (model × workload × device) scenario
warm_runs = 3

# Batch sizes for concurrent request benchmarks (requires llama-server on PATH)
batch_sizes = [1, 4, 8]

# Tokens to generate per completion (can be overridden per workload)
max_tokens = 256

# CPU threads (0 = auto-detect)
cpu_threads = 0

# GPU layers to offload (-1 = all layers, 0 = CPU only)
gpu_layers = -1

# ─── Scoring weights (must sum to 1.0) ───────────────────────────────────────
[scoring]
weight_tokens_per_sec    = 0.40   # generation speed
weight_load_time         = 0.20   # cold-start model load latency
weight_ttft              = 0.20   # time to first token (cold)
weight_batch_throughput  = 0.20   # batch tokens/sec

# ─── Models ──────────────────────────────────────────────────────────────────
# Small models suitable for any machine (CPU-friendly).
# Remove or comment out models you don't want to benchmark.
# Run `llmb models fetch` to download all listed models.

[[models]]
name         = "Qwen2.5-0.5B-Q4_K_M"
filename     = "qwen2.5-0.5b-instruct-q4_k_m.gguf"
url          = "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
params       = "0.5B"
quantization = "Q4_K_M"
context_length = 2048

